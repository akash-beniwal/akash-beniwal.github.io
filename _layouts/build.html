---
layout: default
---
<article class="post build-page">
  <header class="post-header">
    <span class="build-eyebrow">A thing I built</span>
    <h1>{{ page.title }}</h1>
    {% if page.eyebrow %}<p class="post-meta">{{ page.eyebrow }}</p>{% endif %}
  </header>
  {{ content }}
  <p class="post-back"><a href="{{ '/' | relative_url }}">&larr; Back to work</a></p>
</article>
