---
layout: default
---
<article class="post-content build-content">
  <header class="post-header">
    <span class="build-eyebrow">A thing I built</span>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.excerpt %}<p class="build-description">{{ page.excerpt | strip_html }}</p>{% endif %}
  </header>
  <div class="post-body">
    {{ content }}
  </div>
  <footer class="post-footer">
    <a href="{{ '/' | relative_url }}" class="back-link" id="build-back-link">&larr; back home</a>
  </footer>
</article>
{% if page.show_in_writing %}
<script>
  (function () {
    if (document.referrer && document.referrer.indexOf('{{ "/blog/" | relative_url }}') !== -1) {
      var link = document.getElementById('build-back-link');
      link.href = '{{ "/blog/" | relative_url }}';
      link.textContent = '← all writings';
    }
  })();
</script>
{% endif %}
