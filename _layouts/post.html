---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
  </header>
  {{ content }}
  <p class="post-back"><a href="{{ '/blog/' | relative_url }}">&larr; Back to all posts</a></p>
</article>
